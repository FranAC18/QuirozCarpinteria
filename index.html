<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title id="page-title">Quiroz Carpintería - Tarjeta Digital</title>
    <meta
        name="description"
        id="page-desc"
        content="Tarjeta digital de Quiroz Carpintería con contacto directo, redes sociales y ubicación."
    >

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://quiroz-carpinteria.vercel.app/">
    <meta property="og:title" content="Quiroz Carpintería - Tarjeta Digital">
    <meta property="og:description" content="Creamos muebles únicos, resistentes y hechos a tu medida.">
    <meta property="og:image" content="https://quiroz-carpinteria.vercel.app/assets/img/IMG.jpg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Quiroz Carpintería">
    <meta name="twitter:description" content="Creamos muebles únicos, resistentes y hechos a tu medida.">
    <meta name="twitter:image" content="https://quiroz-carpinteria.vercel.app/assets/img/IMG.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/img/QuirozLogo.png">
    <link rel="apple-touch-icon" href="assets/img/IMG.jpg">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="card-container">
        <header class="profile-header fade-in">
            <div class="profile-image-wrapper">
                <div class="profile-image-blur" id="profile-blur"></div>
                <img
                    src=""
                    alt="Logo de Quiroz Carpintería"
                    id="profile-image"
                    class="profile-image"
                    onerror="this.src='assets/img/Quiroz.png'"
                >
            </div>
            <h1 id="profile-name" class="profile-name"></h1>
            <h2 id="profile-title" class="profile-title"></h2>
            <p id="profile-description" class="profile-description"></p>
        </header>

        <section class="actions-grid fade-in staggered-2" aria-label="Acciones principales">
            <button id="save-contact-btn" class="primary-btn" type="button">
                <span>Guardar contacto</span>
            </button>

            <div class="quick-actions" id="quick-actions">
                <a href="#" class="action-btn" id="call-btn" aria-label="Llamar"></a>
                <a href="#" class="action-btn" id="whatsapp-btn" aria-label="Escribir por WhatsApp"></a>
            </div>
        </section>

        <hr class="section-divider fade-in staggered-3">

        <div class="social-title-wrapper fade-in staggered-3">
            <p class="section-title">Nuestras redes sociales</p>
        </div>

        <section class="social-links fade-in staggered-3" id="social-links" aria-label="Redes sociales"></section>

        <hr class="section-divider fade-in staggered-4">

        <section class="share-section fade-in staggered-5">
            <button id="share-btn" class="secondary-btn" type="button">
                Compartir tarjeta
            </button>
        </section>

        <section class="map-section fade-in staggered-6" id="map-section">
            <h3 class="section-title">Visítanos</h3>
            <p id="business-address" class="address-text"></p>
            <div class="map-wrapper">
                <iframe
                    id="google-map"
                    class="map-iframe"
                    title="Ubicación de Quiroz Carpintería"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    allowfullscreen
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.7!2d-78.5!3d-0.18!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMMKwMTAnNDguMCJTIDc4wrAzMCcwMC4wIlc!5e0!3m2!1ses!2sec!4v1234567890"
                ></iframe>
                <noscript>
                    <p class="map-fallback">
                        <a href="https://maps.google.com" target="_blank" rel="noopener noreferrer">Ver mapa en Google Maps</a>
                    </p>
                </noscript>
            </div>
        </section>

        <p class="footer-copy">Quiroz Carpintería © 2026</p>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
